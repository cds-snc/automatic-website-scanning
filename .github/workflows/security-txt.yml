name: Security.txt compliance scan
on:
  workflow_dispatch:
  schedule:
    - cron: "42 8 * * *"

permissions:
  contents: read

jobs:
  security-txt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        domain:
          - https://digital.canada.ca/
          - https://numerique.canada.ca/
          - https://encrypted-message.cdssandbox.xyz/
          - https://articles.cdssandbox.xyz
          - https://staging.notification.cdssandbox.xyz
          - https://forms-staging.cdssandbox.xyz
          - https://design-system.alpha.canada.ca/en/
          - https://app.gc-signin.cdssandbox.xyz/
          - https://gc-signin.cdssandbox.xyz/
          - https://superset.cdssandbox.xyz/
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Scan domain for security.txt
        run: |
          python3 .github/workflows/scripts/scan-security-txt.py \
            --target "${{ matrix.domain }}" \
            --output security-txt-results.jsonl

      - name: Forward results to Sentinel
        uses: cds-snc/sentinel-forward-data-action@caddd5bfbc4032de258dbf4b475a013d1f923a37 # main
        with:
          file_name: security-txt-results.jsonl
          log_type: CDS_SecurityTxt_Results
          log_analytics_workspace_id: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
          log_analytics_workspace_key: ${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}
